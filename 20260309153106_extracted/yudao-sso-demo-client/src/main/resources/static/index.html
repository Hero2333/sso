<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SSO Demo（重写版）</title>
  <script src="./jquery.min.js" type="application/javascript"></script>
  <script type="application/javascript">
    const redirectUri = 'http://127.0.0.1:18080/callback.html';

    function jumpToSso() {
      $.get('http://127.0.0.1:18080/api/sso/login-url', {redirectUri: redirectUri, state: 'demo-state'}, function (result) {
        if (result.code !== 0) {
          alert('获取登录地址失败：' + result.msg);
          return;
        }
        window.location.href = result.data.url;
      });
    }

    function refreshToken() {
      $.post('http://127.0.0.1:18080/api/sso/refresh', function (result) {
        if (result.code !== 0) {
          alert('刷新失败：' + result.msg);
          return;
        }
        alert('刷新成功（token 已保存在服务端会话）');
      });
    }

    function logout() {
      $.post('http://127.0.0.1:18080/api/sso/logout', function (result) {
        if (result.code !== 0) {
          alert('退出失败：' + result.msg);
          return;
        }
        location.reload();
      });
    }

    function loadUser() {
      $.get('http://127.0.0.1:18080/api/sso/me', function (result) {
        if (result.code !== 0) {
          $('#guest').show();
          return;
        }
        $('#guest').hide();
        $('#user').show();
        $('#nickname').text(result.data.nickname || '-');
        $('#username').text(result.data.username || '-');
      });
    }

    $(function () {
      loadUser();
    });
  </script>
</head>
<body>
<div id="guest" style="display:none;">
  未登录，点击 <a href="#" onclick="jumpToSso()">去统一登录</a>
</div>

<div id="user" style="display:none;">
  已登录：<br/>
  账号：<span id="username">-</span><br/>
  昵称：<span id="nickname">-</span><br/>
  <button onclick="refreshToken()">刷新令牌</button>
  <button onclick="logout()">退出登录</button>
</div>
</body>
</html>
